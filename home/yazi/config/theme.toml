# vim:fileencoding=utf-8:foldmethod=marker

# : Manager {{{

[mgr]
cwd = { fg = "cyan" }

# Hovered
hovered = { fg = "black", bg = "lightblue" }
preview_hovered = { underline = true }

# Find
find_keyword = { fg = "yellow", italic = true }
find_position = { fg = "magenta", bg = "reset", italic = true }

# Marker
marker_selected = { fg = "lightgreen", bg = "lightgreen" }
marker_copied = { fg = "lightyellow", bg = "lightyellow" }
marker_cut = { fg = "lightred", bg = "lightred" }

# Tab
tab_active = { fg = "black", bg = "lightblue" }
tab_inactive = { fg = "white", bg = "darkgray" }
tab_width = 1

# Border
border_symbol = " "

# Offset
folder_offset = [1, 0, 1, 0]
preview_offset = [1, 1, 1, 1]

# Highlighting
syntect_theme = ""

# : }}}


# : Status {{{

[status]
separator_open = "юВ╢"
separator_close = "юВ┤"
separator_style = { fg = "darkgray", bg = "darkgray" }

# Mode
mode_normal = { fg = "black", bg = "lightblue", bold = true }
mode_select = { fg = "black", bg = "lightgreen", bold = true }
mode_unset = { fg = "black", bg = "lightmagenta", bold = true }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "blue", bg = "black" }
progress_error = { fg = "red", bg = "black" }

# Permissions
permissions_t = { fg = "lightgreen" }
permissions_r = { fg = "lightyellow" }
permissions_w = { fg = "lightred" }
permissions_x = { fg = "lightcyan" }
permissions_s = { fg = "darkgray" }

# : }}}


# : Select {{{

[select]
border = { fg = "blue" }
active = { fg = "magenta" }
inactive = {}

# : }}}


# : Input {{{

[input]
border = { fg = "blue" }
title = {}
value = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[completion]
border = { fg = "blue" }
active = { bg = "darkgray" }
inactive = {}

# Icons
icon_file = "яЕЫ"
icon_folder = "яДХ"
icon_command = "яТЙ"

# : }}}


# : Tasks {{{

[tasks]
border = { fg = "blue" }
title = {}
hovered = { underline = true }

# : }}}


# : Which {{{

[which]
mask = { bg = "black" }
cand = { fg = "lightcyan" }
rest = { fg = "darkgray" }
desc = { fg = "magenta" }
separator = " юкЬ "
separator_style = { fg = "darkgray" }

# : }}}


# : Help {{{

[help]
on = { fg = "magenta" }
exec = { fg = "cyan" }
desc = { fg = "gray" }
hovered = { bg = "darkgray", bold = true }
footer = { fg = "black", bg = "white" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
  # Images
  { mime = "image/*", fg = "cyan", bold = true },

  # Videos
  { mime = "video/*", fg = "yellow", bold = true },
  { mime = "audio/*", fg = "yellow", bold = true },

  # Archives
  { mime = "application/zip", fg = "magenta", bold = true },
  { mime = "application/gzip", fg = "magenta", bold = true },
  { mime = "application/x-tar", fg = "magenta", bold = true },
  { mime = "application/x-bzip", fg = "magenta", bold = true },
  { mime = "application/x-bzip2", fg = "magenta", bold = true },
  { mime = "application/x-7z-compressed", fg = "magenta", bold = true },
  { mime = "application/x-rar", fg = "magenta", bold = true },

  # Fallback
  # { name = "*", fg = "white" },
  { name = "*/", fg = "blue", bold = true },
]

